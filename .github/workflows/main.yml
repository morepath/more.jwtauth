name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: "${{ matrix.tox-env }}  (Python ${{ matrix.python-version }})"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        include:
          # with cryptography
          - tox-env: "py310-crypto"
            python-version: "3.10"
          - tox-env: "py311-crypto"
            python-version: "3.11"
          - tox-env: "py312-crypto"
            python-version: "3.12"
          - tox-env: "py313-crypto"
            python-version: "3.13"
          - tox-env: "py314-crypto"
            python-version: "3.14"
          - tox-env: "pypy3-crypto"
            python-version: "pypy-3.10"
          - tox-env: "coverage"
            python-version: "3.13"
          # without cryptography
          - tox-env: "py310-nocrypto"
            python-version: "3.10"
          - tox-env: "py311-nocrypto"
            python-version: "3.11"
          - tox-env: "py312-nocrypto"
            python-version: "3.12"
          - tox-env: "py313-nocrypto"
            python-version: "3.13"
          - tox-env: "py314-nocrypto"
            python-version: "3.14"
          - tox-env: "pypy3-nocrypto"
            python-version: "pypy-3.10"
          - tox-env: "lint"
            python-version: "3.13"
          - tox-env: "pre-commit"
            python-version: "3.13"
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install dependencies
        run: python -m pip install --upgrade pip tox
      - name: Run tests for ${{ matrix.tox-env }}
        run: tox -e ${{ matrix.tox-env }}
